<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEDFarms · Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root {
  --bg: #DAB1DA;
  --bg-elev: #e2e1e8;
  --text: #2c1b3d;
  --text-dim: #5e4a72;
  --text-faint: #8a76a0;
  --accent: #a82d8a;
  --accent-deep: #4b2e83;
  --border: #d4c4d4;
  --border-soft: #e8e3e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
.app { max-width: 1400px; margin: 0 auto; padding: 32px 24px 120px; }

.topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; gap: 20px; flex-wrap: wrap; }
.topbar-title { font-size: 28px; font-weight: 600; font-family: 'Fraunces', serif; }
.topbar-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-faint); font-family: 'JetBrains Mono'; }

.filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 28px; }
.filter-select { padding: 8px 12px; font-size: 12px; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono'; }

.section { margin-bottom: 32px; }
.section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.section-title em { color: var(--text-dim); font-style: italic; font-weight: 400; }
.section-meta { font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.1em; margin-left: auto; }

.grid { display: grid; gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))'; gap: 16px; }
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
.card-brand { border-top: 4px solid; }

.metric-group { margin: 14px 0; padding: 12px 0; border-bottom: 1px solid var(--border-soft); }
.metric-group:last-child { border-bottom: none; }
.metric-label { font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; }
.metric-value { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono'; }
.metric-subtext { font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono'; margin-top: 2px; }

.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-elev); font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; color: var(--text-faint); font-weight: 600; }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); }
.data-table .dim { color: var(--text-dim); }
.data-table .mono { font-family: 'JetBrains Mono'; }

.empty-state { padding: 32px; text-align: center; color: var(--text-faint); }
.loading { padding: 60px 20px; text-align: center; color: var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>

<script>
const e = React.createElement;
const { useState, useEffect, useMemo } = React;

const BRAND_COLORS = { 
  'Hyman': '#ef8c3a', 
  'Chill Medicated': '#3f9ae0', 
  'Covert Cups': '#c99e0a',
  'Homiez': '#ff479e', 
  'Value Pak Distro': '#f4f4f4', 
  '100 Shafer': '#68ba7f' 
};
const AVG_UNIT_PRICE = 56.05;

const fmtNum = (n) => (Math.round(n) || 0).toLocaleString();
const fmtMoney = (n) => !n || n === 0 ? '—' : n >= 1e6 ? '$' + (n / 1e6).toFixed(2) + 'M' : n >= 1e3 ? '$' + (n / 1e3).toFixed(1) + 'K' : '$' + n.toFixed(0);
const brandColor = (b) => BRAND_COLORS[b] || '#9dc1a9';

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [filters, setFilters] = useState({ oosFilter: '' });

  useEffect(() => {
    fetch('sales_data.json.gz?t=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.arrayBuffer();
      })
      .then(buf => {
        const bytes = new Uint8Array(buf);
        let text;
        if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
          text = pako.ungzip(bytes, { to: 'string' });
        } else {
          text = new TextDecoder().decode(bytes);
        }
        setData(JSON.parse(text));
      })
      .catch(err => setError(err.message));
  }, []);

  if (error) return e('div', { className: 'app' }, e('div', { style: { padding: '20px', background: '#fef0f0', border: '1px solid #d9b3b3', borderRadius: 4, color: '#8b3333' } }, 'Error: ' + error));
  if (!data) return e('div', { className: 'app' }, e('div', { className: 'loading' }, 'Loading inventory…'));

  return e(Dashboard, { data, filters, setFilters });
}

function Dashboard({ data, filters, setFilters }) {
  const inv = useMemo(() => {
    const inventory = data.inventory || [];
    const byBrand = {};
    const allOos = [];

    inventory.forEach(item => {
      const brand = item.brand || '';
      const onHand = parseFloat(item.inventory) || 0;
      const reserved = parseFloat(item.reserved) || 0;

      if (brand && BRAND_COLORS[brand]) {
        if (!byBrand[brand]) {
          byBrand[brand] = { onHand: 0, reserved: 0, skus: new Set(), oosCount: 0 };
        }
        byBrand[brand].onHand += onHand;
        byBrand[brand].reserved += reserved;
        byBrand[brand].skus.add(item.sku);
        if (onHand <= 0) {
          byBrand[brand].oosCount += 1;
          allOos.push({ sku: item.sku, name: item.name, brand });
        }
      }
    });

    const brands = Object.entries(byBrand).map(([name, d]) => ({
      name,
      onHand: d.onHand,
      reserved: d.reserved,
      available: d.onHand - d.reserved,
      oos: d.oosCount,
      skus: d.skus.size,
    }));

    return { brands, oosProds: allOos };
  }, [data]);

  const filteredOos = inv.oosProds.filter(p => !filters.oosFilter || p.brand === filters.oosFilter);
  const brands = [...new Set(inv.brands.map(b => b.name))].sort();
  const ago = Math.floor((Date.now() - new Date(data.fetched_at).getTime()) / 60000);

  return e('div', { className: 'app' },
    e('div', { className: 'topbar' },
      e('h1', { className: 'topbar-title' }, 'Inventory'),
      e('div', { className: 'topbar-meta' },
        e('span', null, e('strong', null, inv.brands.reduce((s, b) => s + b.skus, 0)), ' SKUs'),
        ' · ',
        e('span', null, 'Updated ', ago < 1 ? 'now' : ago + 'm ago')
      )
    ),

    e('section', { className: 'section' },
      e('h2', { className: 'section-title' }, 'By ', e('em', null, 'brand')),
      e('div', { className: 'grid', style: { gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))' } },
        inv.brands.map(b =>
          e('div', { key: b.name, className: 'card card-brand', style: { borderTopColor: brandColor(b.name) } },
            e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: 12 } },
              e('div', { style: { fontSize: 14, fontWeight: 600 } }, b.name),
              e('div', { style: { fontSize: 11, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' } }, b.skus + ' SKUs')
            ),
            e('div', { className: 'metric-group' },
              e('div', { className: 'metric-label' },
                e('span', null, 'On hand'),
                e('span', { className: 'metric-value' }, fmtNum(b.onHand))
              ),
              e('div', { className: 'metric-subtext' }, fmtMoney(b.onHand * AVG_UNIT_PRICE))
            ),
            e('div', { className: 'metric-group' },
              e('div', { className: 'metric-label' },
                e('span', null, 'Reserved'),
                e('span', { className: 'metric-value' }, fmtNum(b.reserved))
              ),
              e('div', { className: 'metric-subtext' }, fmtMoney(b.reserved * AVG_UNIT_PRICE))
            ),
            e('div', { className: 'metric-group', style: { borderBottom: 'none' } },
              e('div', { className: 'metric-label' },
                e('span', null, 'Available'),
                e('span', { className: 'metric-value', style: { color: 'var(--accent)' } }, fmtNum(b.available))
              ),
              e('div', { className: 'metric-subtext' }, fmtMoney(b.available * AVG_UNIT_PRICE))
            )
          )
        )
      )
    ),

    e('section', { className: 'section' },
      e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 12 } },
        e('h2', { className: 'section-title', style: { margin: 0 } }, 'Out of Stock'),
        e('div', { style: { display: 'flex', gap: 12, alignItems: 'center' } },
          e('span', { className: 'section-meta' }, fmtNum(filteredOos.length) + ' products'),
          e('select', {
            value: filters.oosFilter,
            onChange: (ev) => setFilters(f => ({ ...f, oosFilter: ev.target.value })),
            className: 'filter-select'
          },
            e('option', { value: '' }, 'All brands'),
            brands.map(b => e('option', { key: b, value: b }, b))
          )
        )
      ),
      e('div', { className: 'card', style: { padding: 0, overflow: 'hidden' } },
        filteredOos.length === 0
          ? e('div', { className: 'empty-state' }, 'No out-of-stock products')
          : e('table', { className: 'data-table' },
              e('thead', null,
                e('tr', null,
                  e('th', null, 'SKU'),
                  e('th', null, 'Product'),
                  e('th', null, 'Brand')
                )
              ),
              e('tbody', null,
                filteredOos.map((p, i) =>
                  e('tr', { key: i },
                    e('td', { className: 'mono dim' }, p.sku),
                    e('td', null, p.name),
                    e('td', { className: 'dim', style: { color: brandColor(p.brand) } }, p.brand)
                  )
                )
              )
            )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
