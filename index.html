<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEDFarms · Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root { --bg: #DAB1DA; --bg-elev: #e2e1e8; --text: #2c1b3d; --text-dim: #5e4a72; --text-faint: #8a76a0; --accent: #a82d8a; --border: #d4c4d4; --border-soft: #e8e3e8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
.app { max-width: 1400px; margin: 0 auto; padding: 32px 24px 120px; }
.topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.topbar-title { font-size: 28px; font-weight: 600; }
.topbar-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-faint); font-family: 'JetBrains Mono'; }
.section { margin-bottom: 32px; }
.section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.section-title { font-size: 20px; font-weight: 500; }
.section-title em { color: var(--text-dim); font-style: italic; font-weight: 400; }
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
.card-grid { display: grid; gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))'; gap: 16px; }
.brand-card { border-top: 3px solid; padding: 20px 18px; display: flex; flex-direction: column; gap: 12px; }
.brand-name { font-size: 16px; font-weight: 500; }
.metric { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.metric-val { color: var(--text); font-family: 'JetBrains Mono'; font-weight: 500; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; color: var(--text-faint); font-weight: 500; }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); }
.data-table .dim { color: var(--text-dim); }
.empty-msg { padding: 20px; color: var(--text-faint); text-align: center; }
.error-box { padding: 20px; background: #fef0f0; border: 1px solid #d9b3b3; border-radius: 4px; color: #8b3333; font-size: 13px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const BRAND_COLORS = { 
  'Hyman': '#ef8c3a', 
  'Chill Medicated': '#3f9ae0', 
  'Covert Cups': '#c99e0a',  // ← DARKER YELLOW
  'Homiez': '#ff479e', 
  'Value Pak Distro': '#f4f4f4', 
  '100 Shafer': '#68ba7f' 
};
const AVG_UNIT_PRICE = 56.05;

const fmtNum = (n) => (Math.round(n) || 0).toLocaleString();
const fmtMoney = (n) => !n || n === 0 ? '—' : n >= 1e6 ? '$' + (n / 1e6).toFixed(2) + 'M' : n >= 1e3 ? '$' + (n / 1e3).toFixed(1) + 'K' : '$' + n.toFixed(0);
const brandColor = (b) => BRAND_COLORS[b] || '#9dc1a9';

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [filters, setFilters] = useState({ oosFilter: '' });

  useEffect(() => {
    const load = async () => {
      try {
        // Try to fetch sales data
        const res = await fetch('sales_data.json.gz' + '?t=' + Date.now());
        if (!res.ok) {
          setError('Could not load sales_data.json.gz. Make sure the scraper has been run.');
          return;
        }
        const buf = await res.arrayBuffer();
        // Decompress gzip
        const ds = new DecompressionStream('gzip');
        const reader = buf.stream();
        const decompressed = reader.pipeThrough(ds);
        const chunks = [];
        const rd = decompressed.getReader();
        while (true) {
          const {done, value} = await rd.read();
          if (done) break;
          chunks.push(value);
        }
        const combined = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
        let pos = 0;
        for (const chunk of chunks) {
          combined.set(chunk, pos);
          pos += chunk.length;
        }
        const text = new TextDecoder().decode(combined);
        setData(JSON.parse(text));
      } catch (e) {
        setError('Error loading inventory data: ' + e.message);
        console.error('Inventory load error:', e);
      }
    };
    load();
  }, []);

  if (error) return <div className="app"><div className="error-box">{error}</div></div>;
  if (!data) return <div className="app"><div style={{padding: '20px', textAlign: 'center', color: 'var(--text-faint)'}}>Loading inventory…</div></div>;

  return <InventoryDash data={data} filters={filters} setFilters={setFilters} />;
}

function InventoryDash({ data, filters, setFilters }) {
  const upd = (k, v) => setFilters(f => ({...f, [k]: v}));

  // Parse inventory from rows
  const inv = useMemo(() => {
    const rows = data.rows || [];
    const byBrand = {};
    const allProds = [];

    rows.forEach(r => {
      const brand = r.product_brand || r.brand || '';
      const onHand = parseInt(r.on_hand) || 0;
      const reserved = parseInt(r.reserved) || 0;

      if (brand && BRAND_COLORS[brand]) {
        if (!byBrand[brand]) {
          byBrand[brand] = { onHand: 0, reserved: 0, skus: new Set(), oosCount: 0 };
        }
        byBrand[brand].onHand += onHand;
        byBrand[brand].reserved += reserved;
        byBrand[brand].skus.add(r.sku);
        if (onHand <= 0) byBrand[brand].oosCount += 1;

        if (onHand <= 0) {
          allProds.push({ sku: r.sku, name: r.product_name, brand });
        }
      }
    });

    const brands = Object.entries(byBrand).map(([name, d]) => ({
      name,
      onHand: d.onHand,
      reserved: d.reserved,
      available: d.onHand - d.reserved,
      oos: d.oosCount,
      skus: d.skus.size,
    }));

    return { brands, oosProds: allProds };
  }, [data]);

  const filteredOos = useMemo(() => {
    return inv.oosProds.filter(p => !filters.oosFilter || p.brand === filters.oosFilter);
  }, [inv, filters]);

  const brands = [...new Set(inv.brands.map(b => b.name))].sort();
  const ago = Math.floor((Date.now() - new Date(data.fetched_at).getTime()) / 60000);

  return (
    <div className="app">
      <div className="topbar">
        <h1 className="topbar-title">Inventory</h1>
        <div className="topbar-meta">
          <span><strong>{inv.brands.reduce((s, b) => s + b.skus, 0)}</strong> SKUs</span>
          <span>·</span>
          <span>Updated {ago < 1 ? 'now' : ago + 'm ago'}</span>
        </div>
      </div>

      <section className="section">
        <h2 className="section-title">By <em>brand</em></h2>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 16}}>
          {inv.brands.map(b => (
            <div key={b.name} className="card brand-card" style={{borderTopColor: brandColor(b.name)}}>
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'baseline'}}>
                <div className="brand-name">{b.name}</div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{b.skus} SKUs</div>
              </div>
              <div className="metric">
                <div style={{display: 'flex', justifyContent: 'space-between'}}>
                  <span>On hand</span>
                  <span className="metric-val">{fmtNum(b.onHand)}</span>
                </div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{fmtMoney(b.onHand * AVG_UNIT_PRICE)}</div>
              </div>
              <div className="metric">
                <div style={{display: 'flex', justifyContent: 'space-between'}}>
                  <span>Reserved</span>
                  <span className="metric-val">{fmtNum(b.reserved)}</span>
                </div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{fmtMoney(b.reserved * AVG_UNIT_PRICE)}</div>
              </div>
              <div className="metric">
                <div style={{display: 'flex', justifyContent: 'space-between'}}>
                  <span>Available</span>
                  <span className="metric-val" style={{color: 'var(--accent)'}}>{fmtNum(b.available)}</span>
                </div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{fmtMoney(b.available * AVG_UNIT_PRICE)}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      <section className="section">
        <div className="section-header">
          <h2 className="section-title">Out of Stock <em>· 0 units</em></h2>
          <div style={{display: 'flex', gap: 12, alignItems: 'center'}}>
            <span style={{fontSize: 11, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono', textTransform: 'uppercase'}}>{fmtNum(filteredOos.length)} products</span>
            <select value={filters.oosFilter} onChange={e => upd('oosFilter', e.target.value)} 
              style={{padding: '6px 10px', fontSize: 12, background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: 2, cursor: 'pointer'}}>
              <option value="">All brands</option>
              {brands.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>
        </div>
        <div className="card" style={{padding: 0, overflow: 'hidden'}}>
          {filteredOos.length === 0 ? (
            <div className="empty-msg">No out-of-stock products</div>
          ) : (
            <div style={{overflowX: 'auto'}}>
              <table className="data-table">
                <thead><tr><th>SKU</th><th>Product</th><th>Brand</th></tr></thead>
                <tbody>
                  {filteredOos.map((p, i) => (
                    <tr key={i}>
                      <td className="dim" style={{fontFamily: 'JetBrains Mono'}}>{p.sku}</td>
                      <td>{p.name}</td>
                      <td className="dim" style={{color: brandColor(p.brand)}}>{p.brand}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
