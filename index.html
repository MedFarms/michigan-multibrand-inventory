<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEDFarms · Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root { --bg: #DAB1DA; --bg-elev: #e2e1e8; --text: #2c1b3d; --text-dim: #5e4a72; --text-faint: #8a76a0; --accent: #a82d8a; --border: #d4c4d4; --border-soft: #e8e3e8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
.app { max-width: 1400px; margin: 0 auto; padding: 32px 24px 120px; }
.topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.topbar-title { font-size: 28px; font-weight: 600; }
.section { margin-bottom: 32px; }
.section-title { font-size: 20px; font-weight: 500; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
.brand-card { border-top: 3px solid; padding: 20px; }
.metric { font-size: 13px; margin: 12px 0; }
.table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; color: var(--text-faint); }
.table td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); }
.loading { padding: 60px 20px; text-align: center; color: var(--text-faint); }
.error { padding: 20px; background: #fef0f0; border: 2px solid #d9b3b3; border-radius: 4px; color: #8b3333; }
</style>
</head>
<body>
<div id="root"></div>

<script>
const e = React.createElement;
const { useState, useEffect, useMemo } = React;

const BRAND_COLORS = { 
  'Hyman': '#ef8c3a', 
  'Chill Medicated': '#3f9ae0', 
  'Covert Cups': '#c99e0a',
  'Homiez': '#ff479e', 
  'Value Pak Distro': '#f4f4f4', 
  '100 Shafer': '#68ba7f' 
};
const AVG_UNIT_PRICE = 56.05;

const fmtNum = (n) => (Math.round(n) || 0).toLocaleString();
const fmtMoney = (n) => !n || n === 0 ? '—' : n >= 1e6 ? '$' + (n / 1e6).toFixed(2) + 'M' : n >= 1e3 ? '$' + (n / 1e3).toFixed(1) + 'K' : '$' + n.toFixed(0);
const brandColor = (b) => BRAND_COLORS[b] || '#9dc1a9';

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [filters, setFilters] = useState({ oosFilter: '' });

  useEffect(() => {
    console.log('[Inventory] Mounting, fetching data...');
    
    fetch('sales_data.json.gz?t=' + Date.now())
      .then(r => {
        console.log('[Inventory] Fetch response:', r.status);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.arrayBuffer();
      })
      .then(buf => {
        console.log('[Inventory] Got', buf.byteLength, 'bytes');
        const bytes = new Uint8Array(buf);
        let text;
        if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
          console.log('[Inventory] Decompressing gzip...');
          text = pako.ungzip(bytes, { to: 'string' });
        } else {
          console.log('[Inventory] Reading as plain text...');
          text = new TextDecoder().decode(bytes);
        }
        const obj = JSON.parse(text);
        console.log('[Inventory] Parsed data, keys:', Object.keys(obj));
        console.log('[Inventory] Inventory items:', obj.inventory ? obj.inventory.length : 0);
        setData(obj);
      })
      .catch(err => {
        console.error('[Inventory] Error:', err);
        setError(err.message);
      });
  }, []);

  if (error) {
    return e('div', { className: 'app' }, 
      e('div', { className: 'error' }, 
        e('strong', null, 'Error: '), error
      )
    );
  }

  if (!data) {
    return e('div', { className: 'app' }, 
      e('div', { className: 'loading' }, 'Loading inventory…')
    );
  }

  return e(Dashboard, { data, filters, setFilters });
}

function Dashboard({ data, filters, setFilters }) {
  const inv = useMemo(() => {
    const inventory = data.inventory || [];
    const byBrand = {};
    const allOos = [];

    inventory.forEach(item => {
      const brand = item.brand || '';
      const onHand = parseFloat(item.inventory) || 0;
      const reserved = parseFloat(item.reserved) || 0;

      if (brand && BRAND_COLORS[brand]) {
        if (!byBrand[brand]) {
          byBrand[brand] = { onHand: 0, reserved: 0, skus: new Set(), oosCount: 0 };
        }
        byBrand[brand].onHand += onHand;
        byBrand[brand].reserved += reserved;
        byBrand[brand].skus.add(item.sku);
        if (onHand <= 0) {
          byBrand[brand].oosCount += 1;
          allOos.push({ sku: item.sku, name: item.name, brand });
        }
      }
    });

    const brands = Object.entries(byBrand).map(([name, d]) => ({
      name,
      onHand: d.onHand,
      reserved: d.reserved,
      available: d.onHand - d.reserved,
      oos: d.oosCount,
      skus: d.skus.size,
    }));

    return { brands, oosProds: allOos };
  }, [data]);

  const filteredOos = inv.oosProds.filter(p => !filters.oosFilter || p.brand === filters.oosFilter);
  const brands = [...new Set(inv.brands.map(b => b.name))].sort();
  const ago = Math.floor((Date.now() - new Date(data.fetched_at).getTime()) / 60000);

  return e('div', { className: 'app' },
    // Topbar
    e('div', { className: 'topbar' },
      e('h1', { className: 'topbar-title' }, 'Inventory'),
      e('div', null,
        e('span', null, e('strong', null, inv.brands.reduce((s, b) => s + b.skus, 0)), ' SKUs'),
        ' · ',
        e('span', null, 'Updated ', ago < 1 ? 'now' : ago + 'm ago')
      )
    ),

    // Brand cards
    e('section', { className: 'section' },
      e('h2', { className: 'section-title' }, 'By ', e('em', null, 'brand')),
      e('div', { className: 'grid' },
        inv.brands.map(b =>
          e('div', { key: b.name, className: 'card brand-card', style: { borderTopColor: brandColor(b.name) } },
            e('div', { style: { display: 'flex', justifyContent: 'space-between' } },
              e('div', { style: { fontSize: 16, fontWeight: 500 } }, b.name),
              e('div', { style: { fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' } }, b.skus + ' SKUs')
            ),
            e('div', { className: 'metric' },
              e('div', { style: { display: 'flex', justifyContent: 'space-between' } },
                e('span', null, 'On hand'),
                e('span', { style: { fontFamily: 'JetBrains Mono', fontWeight: 500 } }, fmtNum(b.onHand))
              ),
              e('div', { style: { fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' } }, fmtMoney(b.onHand * AVG_UNIT_PRICE))
            ),
            e('div', { className: 'metric' },
              e('div', { style: { display: 'flex', justifyContent: 'space-between' } },
                e('span', null, 'Reserved'),
                e('span', { style: { fontFamily: 'JetBrains Mono', fontWeight: 500 } }, fmtNum(b.reserved))
              ),
              e('div', { style: { fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' } }, fmtMoney(b.reserved * AVG_UNIT_PRICE))
            ),
            e('div', { className: 'metric' },
              e('div', { style: { display: 'flex', justifyContent: 'space-between' } },
                e('span', null, 'Available'),
                e('span', { style: { fontFamily: 'JetBrains Mono', fontWeight: 500, color: 'var(--accent)' } }, fmtNum(b.available))
              ),
              e('div', { style: { fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' } }, fmtMoney(b.available * AVG_UNIT_PRICE))
            )
          )
        )
      )
    ),

    // Out of stock
    e('section', { className: 'section' },
      e('h2', { className: 'section-title' }, 'Out of Stock'),
      e('select', {
        value: filters.oosFilter,
        onChange: (ev) => setFilters(f => ({ ...f, oosFilter: ev.target.value })),
        style: { padding: '6px 10px', fontSize: 12, background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: 2, cursor: 'pointer', marginBottom: 12 }
      },
        e('option', { value: '' }, 'All brands'),
        brands.map(b => e('option', { key: b, value: b }, b))
      ),
      e('div', { className: 'card', style: { padding: 0, overflow: 'hidden' } },
        filteredOos.length === 0
          ? e('div', { style: { padding: 20, color: 'var(--text-faint)', textAlign: 'center' } }, 'No out-of-stock products')
          : e('table', { className: 'table' },
              e('thead', null,
                e('tr', null,
                  e('th', null, 'SKU'),
                  e('th', null, 'Product'),
                  e('th', null, 'Brand')
                )
              ),
              e('tbody', null,
                filteredOos.map((p, i) =>
                  e('tr', { key: i },
                    e('td', { style: { fontFamily: 'JetBrains Mono', color: 'var(--text-dim)' } }, p.sku),
                    e('td', null, p.name),
                    e('td', { style: { color: brandColor(p.brand) } }, p.brand)
                  )
                )
              )
            )
      )
    )
  );
}

// Mount
setTimeout(() => {
  console.log('[Inventory] Rendering to root...');
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
}, 0);
</script>
</body>
</html>
