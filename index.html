<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEDFarms · Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root { --bg: #DAB1DA; --bg-elev: #e2e1e8; --text: #2c1b3d; --text-dim: #5e4a72; --text-faint: #8a76a0; --accent: #a82d8a; --border: #d4c4d4; --border-soft: #e8e3e8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
.app { max-width: 1400px; margin: 0 auto; padding: 32px 24px 120px; }
.debug { background: #fff9f0; border: 2px solid #ff8c00; padding: 16px; margin: 20px 0; border-radius: 4px; font-family: monospace; font-size: 11px; line-height: 1.8; color: #333; max-height: 300px; overflow-y: auto; }
.debug-title { font-weight: bold; color: #c65911; margin-bottom: 8px; }
.topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.topbar-title { font-size: 28px; font-weight: 600; }
.topbar-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-faint); font-family: 'JetBrains Mono'; }
.section { margin-bottom: 32px; }
.section-title { font-size: 20px; font-weight: 500; }
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
.brand-card { border-top: 3px solid; padding: 20px 18px; display: flex; flex-direction: column; gap: 12px; }
.brand-name { font-size: 16px; font-weight: 500; }
.metric { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.metric-val { color: var(--text); font-family: 'JetBrains Mono'; font-weight: 500; }
.loading { padding: 60px 20px; text-align: center; color: var(--text-faint); font-size: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const BRAND_COLORS = { 
  'Hyman': '#ef8c3a', 
  'Chill Medicated': '#3f9ae0', 
  'Covert Cups': '#c99e0a',
  'Homiez': '#ff479e', 
  'Value Pak Distro': '#f4f4f4', 
  '100 Shafer': '#68ba7f' 
};
const AVG_UNIT_PRICE = 56.05;

const fmtNum = (n) => (Math.round(n) || 0).toLocaleString();
const fmtMoney = (n) => !n || n === 0 ? '—' : n >= 1e6 ? '$' + (n / 1e6).toFixed(2) + 'M' : n >= 1e3 ? '$' + (n / 1e3).toFixed(1) + 'K' : '$' + n.toFixed(0);
const brandColor = (b) => BRAND_COLORS[b] || '#9dc1a9';

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [debug, setDebug] = useState([]);
  const [filters, setFilters] = useState({ oosFilter: '' });

  const addDebug = (msg) => {
    console.log('[DEBUG]', msg);
    setDebug(d => [...d, new Date().toLocaleTimeString() + ': ' + msg]);
  };

  useEffect(() => {
    addDebug('Component mounted, starting fetch...');
    
    const load = async () => {
      try {
        const url = 'sales_data.json.gz?t=' + Date.now();
        addDebug('Fetching: ' + url);
        
        const res = await fetch(url);
        addDebug('Response status: ' + res.status);
        
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        
        const buf = await res.arrayBuffer();
        addDebug('Got ' + buf.byteLength + ' bytes');
        
        const bytes = new Uint8Array(buf);
        addDebug('First 2 bytes: 0x' + bytes[0].toString(16) + ' 0x' + bytes[1].toString(16));
        
        let text;
        if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
          addDebug('Data is gzipped, decompressing...');
          text = pako.ungzip(bytes, { to: 'string' });
          addDebug('Decompressed to ' + text.length + ' chars');
        } else {
          addDebug('Data not gzipped, reading as text...');
          text = new TextDecoder().decode(bytes);
        }
        
        const obj = JSON.parse(text);
        addDebug('Parsed JSON. Keys: ' + Object.keys(obj).join(', '));
        addDebug('Inventory items: ' + (obj.inventory ? obj.inventory.length : 'none'));
        
        setData(obj);
        addDebug('Data loaded successfully!');
      } catch (e) {
        addDebug('ERROR: ' + e.message);
        setError(e.message);
      }
    };
    
    load();
  }, []);

  if (error) return (
    <div className="app">
      <div style={{padding: '20px', background: '#fef0f0', border: '2px solid #d9b3b3', borderRadius: 4, color: '#8b3333'}}>
        <strong>Error loading data:</strong> {error}
        <div style={{marginTop: 12, fontSize: 12, maxHeight: 200, overflow: 'auto', background: '#fff', padding: 10, border: '1px solid #d9b3b3', borderRadius: 2}}>
          {debug.map((d, i) => <div key={i} style={{fontFamily: 'monospace'}}>{d}</div>)}
        </div>
      </div>
    </div>
  );
  
  if (!data) return (
    <div className="app">
      <div className="loading">
        Loading inventory…
        <div className="debug">
          <div className="debug-title">Debug Log:</div>
          {debug.length === 0 ? 'Waiting for data...' : debug.map((d, i) => <div key={i}>{d}</div>)}
        </div>
      </div>
    </div>
  );

  return <InventoryDash data={data} filters={filters} setFilters={setFilters} debug={debug} />;
}

function InventoryDash({ data, filters, setFilters, debug }) {
  const upd = (k, v) => setFilters(f => ({...f, [k]: v}));

  const inv = useMemo(() => {
    const inventory = data.inventory || [];
    const byBrand = {};
    const allOosProds = [];

    inventory.forEach(item => {
      const brand = item.brand || '';
      const onHand = parseFloat(item.inventory) || 0;
      const reserved = parseFloat(item.reserved) || 0;

      if (brand && BRAND_COLORS[brand]) {
        if (!byBrand[brand]) {
          byBrand[brand] = { onHand: 0, reserved: 0, skus: new Set(), oosCount: 0 };
        }
        byBrand[brand].onHand += onHand;
        byBrand[brand].reserved += reserved;
        byBrand[brand].skus.add(item.sku);
        if (onHand <= 0) {
          byBrand[brand].oosCount += 1;
          allOosProds.push({ sku: item.sku, name: item.name, brand });
        }
      }
    });

    const brands = Object.entries(byBrand).map(([name, d]) => ({
      name,
      onHand: d.onHand,
      reserved: d.reserved,
      available: d.onHand - d.reserved,
      oos: d.oosCount,
      skus: d.skus.size,
    }));

    return { brands, oosProds: allOosProds };
  }, [data]);

  const filteredOos = useMemo(() => {
    return inv.oosProds.filter(p => !filters.oosFilter || p.brand === filters.oosFilter);
  }, [inv, filters]);

  const brands = [...new Set(inv.brands.map(b => b.name))].sort();
  const ago = Math.floor((Date.now() - new Date(data.fetched_at).getTime()) / 60000);

  return (
    <div className="app">
      <div className="topbar">
        <h1 className="topbar-title">Inventory</h1>
        <div className="topbar-meta">
          <span><strong>{inv.brands.reduce((s, b) => s + b.skus, 0)}</strong> SKUs</span>
          <span>·</span>
          <span>Updated {ago < 1 ? 'now' : ago + 'm ago'}</span>
        </div>
      </div>

      <section className="section">
        <h2 className="section-title">By <em>brand</em></h2>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 16}}>
          {inv.brands.map(b => (
            <div key={b.name} className="card brand-card" style={{borderTopColor: brandColor(b.name)}}>
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'baseline'}}>
                <div className="brand-name">{b.name}</div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{b.skus} SKUs</div>
              </div>
              <div className="metric">
                <div style={{display: 'flex', justifyContent: 'space-between'}}>
                  <span>On hand</span>
                  <span className="metric-val">{fmtNum(b.onHand)}</span>
                </div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{fmtMoney(b.onHand * AVG_UNIT_PRICE)}</div>
              </div>
              <div className="metric">
                <div style={{display: 'flex', justifyContent: 'space-between'}}>
                  <span>Reserved</span>
                  <span className="metric-val">{fmtNum(b.reserved)}</span>
                </div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{fmtMoney(b.reserved * AVG_UNIT_PRICE)}</div>
              </div>
              <div className="metric">
                <div style={{display: 'flex', justifyContent: 'space-between'}}>
                  <span>Available</span>
                  <span className="metric-val" style={{color: 'var(--accent)'}}>{fmtNum(b.available)}</span>
                </div>
                <div style={{fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono'}}>{fmtMoney(b.available * AVG_UNIT_PRICE)}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      <section className="section">
        <h2 className="section-title">Out of Stock <em>· 0 units</em></h2>
        <select value={filters.oosFilter} onChange={e => setFilters(f => ({...f, oosFilter: e.target.value}))} 
          style={{padding: '6px 10px', fontSize: 12, background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: 2, cursor: 'pointer', marginBottom: 12}}>
          <option value="">All brands</option>
          {brands.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        <div className="card" style={{padding: 0, overflow: 'hidden'}}>
          {filteredOos.length === 0 ? (
            <div style={{padding: 20, color: 'var(--text-faint)', textAlign: 'center'}}>No out-of-stock products</div>
          ) : (
            <div style={{overflowX: 'auto'}}>
              <table style={{width: '100%', borderCollapse: 'collapse', fontSize: 12}}>
                <thead><tr style={{background: 'var(--bg-elev)'}}>
                  <th style={{textAlign: 'left', padding: '12px 16px', borderBottom: '1px solid var(--border)', fontFamily: 'JetBrains Mono', fontSize: 10, textTransform: 'uppercase', color: 'var(--text-faint)'}}>SKU</th>
                  <th style={{textAlign: 'left', padding: '12px 16px', borderBottom: '1px solid var(--border)', fontFamily: 'JetBrains Mono', fontSize: 10, textTransform: 'uppercase', color: 'var(--text-faint)'}}>Product</th>
                  <th style={{textAlign: 'left', padding: '12px 16px', borderBottom: '1px solid var(--border)', fontFamily: 'JetBrains Mono', fontSize: 10, textTransform: 'uppercase', color: 'var(--text-faint)'}}>Brand</th>
                </tr></thead>
                <tbody>
                  {filteredOos.map((p, i) => (
                    <tr key={i} style={{borderBottom: '1px solid var(--border-soft)'}}>
                      <td style={{padding: '12px 16px', fontFamily: 'JetBrains Mono', color: 'var(--text-dim)'}}>{p.sku}</td>
                      <td style={{padding: '12px 16px'}}>{p.name}</td>
                      <td style={{padding: '12px 16px', color: brandColor(p.brand)}}>{p.brand}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
