<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEDFarms · Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root { --bg: #DAB1DA; --bg-elev: #e2e1e8; --text: #2c1b3d; --text-dim: #5e4a72; --text-faint: #8a76a0; --accent: #a82d8a; --border: #d4c4d4; --border-soft: #e8e3e8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.app { max-width: 1400px; margin: 0 auto; padding: 32px 24px 120px; }
.topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.topbar-title { font-size: 28px; font-weight: 600; }
.topbar-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-faint); font-family: 'JetBrains Mono'; }
.filters { display: flex; gap: 16px; flex-wrap: wrap; padding: 16px 20px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 28px; align-items: flex-end; }
.filter-select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; font-family: 'Inter'; font-size: 13px; border-radius: 2px; cursor: pointer; }
.filter-reset { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 14px; font-size: 11px; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.15s; font-family: 'JetBrains Mono'; }
.filter-reset:hover { color: var(--text); border-color: var(--text-dim); }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.kpi { background: var(--bg-elev); padding: 24px 18px; display: flex; flex-direction: column; gap: 9px; align-items: center; text-align: center; justify-content: center; min-height: 124px; }
.kpi-label { font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); text-align: center; }
.kpi-value { font-size: 44px; line-height: 1.04; color: var(--text); font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
.kpi-sub { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-dim); text-align: center; }
.section { margin-bottom: 32px; }
.section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.section-title { font-size: 20px; font-weight: 500; }
.section-title em { color: var(--text-dim); font-style: italic; font-weight: 400; }
.section-meta { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; }
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); font-weight: 500; background: var(--bg-elev); }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); color: var(--text); }
.data-table .dim { color: var(--text-dim); }
.data-table .font-mono { font-family: 'JetBrains Mono'; font-variant-numeric: tabular-nums; }
.sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-elev); border-top: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; gap: 24px; flex-wrap: wrap; align-items: center; z-index: 100; }
.footer-nav { display: flex; gap: 20px; }
.fn-tab { text-decoration: none; padding: 8px 0; border-bottom: 2px solid transparent; color: var(--text-dim); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono'; text-transform: uppercase; }
.fn-tab:hover { color: var(--text); }
.fn-tab.fn-active { color: var(--accent); border-bottom-color: var(--accent); }
.footer-brands { display: flex; gap: 8px; flex-wrap: wrap; }
@media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* =====================================================================
   INVENTORY DASHBOARD
   ===================================================================== */
const NAV = [
  { key: 'sales',     label: 'Sales',        href: 'https://maeann-png.github.io/michigan-mutibrand-sales/' },
  { key: 'ar',        label: 'Receivables',  href: 'https://maeann-png.github.io/michigan-multibrand-ar/' },
  { key: 'inventory', label: 'Inventory',    href: 'https://maeann-png.github.io/michigan-multibrand-inventory/' },
  { key: 'rep',       label: 'By Rep',       href: 'https://maeann-png.github.io/michigan-multibrand-rep/' },
];
const ACTIVE = 'inventory';
const AVG_UNIT_PRICE = 56.05;
const BRAND_COLORS = { 'Hyman': '#ef8c3a', 'Chill Medicated': '#3f9ae0', 'Covert Cups': '#c99e0a', 'Homiez': '#ff479e', 'Value Pak Distro': '#f4f4f4', '100 Shafer': '#68ba7f' };
const BRAND_LABEL = { 'Hyman': 'Hyman', 'Chill Medicated': 'Chill', 'Covert Cups': 'Covert', 'Homiez': 'Homiez', 'Value Pak Distro': 'Value Pak', '100 Shafer': '100 Shafer' };
const PRIMARY_BRANDS = ["Hyman", "Chill Medicated", "Value Pak Distro", "100 Shafer", "Homiez", "Covert Cups"];
const fmtNum = (n) => (Math.round(n) || 0).toLocaleString();
const fmtMoney = (n) => n == null || n === 0 ? '—' : (n >= 1e6 ? '$' + (n / 1e6).toFixed(2) + 'M' : n >= 1e3 ? '$' + (n / 1e3).toFixed(1) + 'K' : '$' + n.toFixed(0));
const brandColor = (b) => BRAND_COLORS[b] || '#9dc1a9';
const brandLabel = (b) => BRAND_LABEL[b] || b;

function App() {
  const { data, error } = useData('sales_data.json.gz');
  const [filters, setFilters] = useState({ brand: '', oosFilter: '' });
  const upd = (k, v) => setFilters(f => ({ ...f, [k]: v }));
  
  if (error) return <div className="app"><Empty title="No data yet"><p>Run the scraper to produce sales_data.json.gz, then refresh.</p><p style={{ marginTop: 10, fontSize: 12, color: 'var(--text-faint)' }}>{error}</p></Empty></div>;
  if (!data) return <div className="app"><Spinner /></div>;
  return <InventoryDashboard data={data} filters={filters} setFilters={setFilters} />;
}

function InventoryDashboard({ data, filters, setFilters }) {
  const rows = data.rows || [];
  const normalized = useMemo(() => normalizeRows(rows), [rows]);
  const fetchedAt = data.fetched_at ? new Date(data.fetched_at) : new Date();
  const upd = (k, v) => setFilters(f => ({ ...f, [k]: v }));

  // Extract inventory data from rows (product-level: sku, on_hand, reserved, etc.)
  const inv = useMemo(() => {
    const byBrand = {};
    const allProducts = [];
    const skuSet = new Set();
    
    normalized.forEach(r => {
      if (r.sku && r.on_hand != null) {
        skuSet.add(r.sku);
        const b = r.product_brand || r.brand || '';
        if (PRIMARY_BRANDS.includes(b)) {
          if (!byBrand[b]) byBrand[b] = { onHand: 0, reserved: 0, available: 0, oos: 0, skus: new Set() };
          byBrand[b].onHand += r.on_hand;
          byBrand[b].reserved += r.reserved || 0;
          byBrand[b].available += (r.on_hand - (r.reserved || 0));
          if (r.on_hand <= 0) byBrand[b].oos += 1;
          byBrand[b].skus.add(r.sku);
        }
        allProducts.push({ sku: r.sku, name: r.product_name, brand: b, onHand: r.on_hand, reserved: r.reserved || 0 });
      }
    });

    const total = { onHand: 0, reserved: 0, available: 0, oos: 0, skus: skuSet.size };
    Object.values(byBrand).forEach(b => {
      total.onHand += b.onHand;
      total.reserved += b.reserved;
      total.available += b.available;
      total.oos += b.oos;
    });

    return {
      skus: skuSet.size,
      onHand: total.onHand,
      reserved: total.reserved,
      available: total.available,
      oos: total.oos,
      byBrand: Object.entries(byBrand).map(([name, data]) => ({
        name,
        onHand: data.onHand,
        reserved: data.reserved,
        available: data.available,
        oos: data.oos,
        skuCount: data.skus.size,
      })),
      allProducts,
    };
  }, [normalized]);

  // OOS products with brand filter
  const oosProducts = useMemo(() => {
    return inv.allProducts
      .filter(p => p.onHand <= 0)
      .filter(p => !filters.oosFilter || p.brand === filters.oosFilter)
      .sort((a, b) => a.brand.localeCompare(b.brand));
  }, [inv, filters.oosFilter]);

  const distinct = useMemo(() => ({
    brands: PRIMARY_BRANDS.filter(b => inv.byBrand.some(x => x.name === b)),
  }), [inv]);

  return (
    <div className="app" style={{ paddingBottom: 110 }}>
      <Topbar section="Inventory" fetchedAt={fetchedAt} right={<span><strong>{fmtNum(inv.skus)}</strong> SKUs</span>} />

      {/* Brand filter buttons */}
      <BrandButtons brands={distinct.brands} value={filters.brand} onChange={(b) => upd('brand', b)} />

      {/* Filters */}
      <div className="filters">
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end', width: '100%' }}>
          <button className="filter-reset" onClick={() => upd('oosFilter', '')}>Reset</button>
        </div>
      </div>

      {/* KPI Cards */}
      <div className="kpi-grid" style={{ marginBottom: 24 }}>
        <Kpi label="Units On Hand" value={fmtNum(inv.onHand)} accent sub={fmtNum(inv.skus) + ' SKUs'} />
        <Kpi label="Reserved" value={fmtNum(inv.reserved)} sub="committed to orders" />
        <Kpi label="Available" value={fmtNum(inv.available)} sub="on hand − reserved" />
        <Kpi label="Out of Stock" value={fmtNum(inv.oos)} color={inv.oos ? '#e2554f' : null} sub="SKUs at 0" />
      </div>

      {/* Per-brand cards with dollar values */}
      <section className="section">
        <SectionHeader title="By" em="brand" meta={fmtNum(inv.byBrand.length) + ' brands'} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 16 }}>
          {inv.byBrand.map((b, i) => (
            <div
              key={i}
              className="card"
              style={{
                borderTop: `3px solid ${brandColor(b.name)}`,
                padding: '20px 18px',
                display: 'flex',
                flexDirection: 'column',
                gap: 12,
              }}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8 }}>
                <div style={{ fontSize: 16, fontWeight: 500, color: 'var(--text)' }}>{brandLabel(b.name)}</div>
                <div style={{ fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' }}>{b.skuCount} SKUs</div>
              </div>
              <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span>On hand</span>
                  <span style={{ color: 'var(--text)', fontFamily: 'JetBrains Mono', fontWeight: 500 }}>{fmtNum(b.onHand)}</span>
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' }}>{fmtMoney(b.onHand * AVG_UNIT_PRICE)}</div>
              </div>
              <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span>Reserved</span>
                  <span style={{ color: 'var(--text)', fontFamily: 'JetBrains Mono', fontWeight: 500 }}>{fmtNum(b.reserved)}</span>
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' }}>{fmtMoney(b.reserved * AVG_UNIT_PRICE)}</div>
              </div>
              <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span>Available</span>
                  <span style={{ color: 'var(--accent)', fontFamily: 'JetBrains Mono', fontWeight: 500 }}>{fmtNum(b.available)}</span>
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-faint)', fontFamily: 'JetBrains Mono' }}>{fmtMoney(b.available * AVG_UNIT_PRICE)}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* Out-of-stock products section with brand filter */}
      <section className="section">
        <div className="section-header">
          <h2 className="section-title">Out of Stock <em>· 0 units</em></h2>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <span className="section-meta">{fmtNum(oosProducts.length)} products</span>
            <select
              className="filter-select"
              value={filters.oosFilter}
              onChange={(e) => upd('oosFilter', e.target.value)}
              style={{ width: 140, padding: '6px 10px', fontSize: 12 }}
            >
              <option value="">All brands</option>
              {distinct.brands.map(b => <option key={b} value={b}>{brandLabel(b)}</option>)}
            </select>
          </div>
        </div>
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          {oosProducts.length === 0 ? (
            <div style={{ padding: 20, color: 'var(--text-faint)', textAlign: 'center', fontSize: 13 }}>No out-of-stock products</div>
          ) : (
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead>
                  <tr>
                    <th>SKU</th>
                    <th>Product</th>
                    <th>Brand</th>
                  </tr>
                </thead>
                <tbody>
                  {oosProducts.map((p, i) => (
                    <tr key={i}>
                      <td className="dim font-mono">{p.sku}</td>
                      <td>{p.name}</td>
                      <td className="dim" style={{ color: brandColor(p.brand) }}>{brandLabel(p.brand)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </section>

      <StickyFooter nav={NAV} active={ACTIVE} brands={distinct.brands} brand={filters.brand} onBrand={(b) => upd('brand', b)} />
    </div>
  );
}

// =====================================================================
// COMPONENTS
// =====================================================================

function Topbar({ section, fetchedAt, right }) {
  const ago = Math.floor((Date.now() - fetchedAt.getTime()) / 60000);
  return (
    <div className="topbar">
      <h1 className="topbar-title">{section}</h1>
      <div className="topbar-meta">
        {right && <span>{right}</span>}
        <span>·</span>
        <span>Updated {ago < 1 ? 'just now' : ago + 'm ago'}</span>
      </div>
    </div>
  );
}

function BrandButtons({ brands, value, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 24 }}>
      {brands.map(b => (
        <button
          key={b}
          onClick={() => onChange(value === b ? '' : b)}
          style={{
            padding: '8px 14px',
            borderRadius: 4,
            border: `1.5px solid ${brandColor(b)}`,
            background: value === b ? brandColor(b) : 'transparent',
            color: value === b ? '#000' : brandColor(b),
            fontSize: 12,
            fontWeight: 500,
            cursor: 'pointer',
            fontFamily: 'JetBrains Mono',
          }}
        >
          {BRAND_LABEL[b]}
        </button>
      ))}
    </div>
  );
}

function Kpi({ label, value, accent, color, sub }) {
  return (
    <div className="kpi" style={accent ? { color: 'var(--accent)' } : color ? { color } : undefined}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value" style={{ fontSize: 44 }}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function SectionHeader({ title, em, meta }) {
  return (
    <div className="section-header">
      <h2 className="section-title">
        {title} <em>{em}</em>
      </h2>
      {meta && <span className="section-meta">{meta}</span>}
    </div>
  );
}

function StickyFooter({ nav, active, brands, brand, onBrand }) {
  return (
    <div className="sticky-footer">
      <nav className="footer-nav">
        {nav.map(n => (
          <a key={n.key} href={n.href} className={'fn-tab' + (n.key === active ? ' fn-active' : '')}>
            {n.label}
          </a>
        ))}
      </nav>
      <div className="footer-brands">
        {brands.map(b => (
          <button
            key={b}
            onClick={() => onBrand(brand === b ? '' : b)}
            style={{
              padding: '6px 12px',
              borderRadius: 2,
              border: `1px solid ${brandColor(b)}`,
              background: brand === b ? brandColor(b) : 'transparent',
              color: brand === b ? '#000' : brandColor(b),
              fontSize: 11,
              cursor: 'pointer',
              fontFamily: 'JetBrains Mono',
            }}
          >
            {BRAND_LABEL[b]}
          </button>
        ))}
      </div>
    </div>
  );
}

function Empty({ title, children }) {
  return (
    <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-dim)' }}>
      <h2 style={{ fontSize: 24, marginBottom: 12, color: 'var(--text)' }}>{title}</h2>
      {children}
    </div>
  );
}

function Spinner() {
  return <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-dim)' }}>Loading…</div>;
}

// Helper: fetch and decompress data
function useData(filename) {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    const load = async () => {
      try {
        const res = await fetch(filename + '?t=' + Date.now());
        if (!res.ok) throw new Error('Failed to load ' + filename);
        const gz = await res.arrayBuffer();
        const ds = new DecompressionStream('gzip');
        const decompressed = await new Response(ds.readable.pipeThrough(new TransformStream({ transform: (chunk, c) => c.enqueue(chunk), flush: (c) => c.enqueue(new Uint8Array()) })), { body: gz.stream() }).arrayBuffer();
        const text = new TextDecoder().decode(decompressed);
        setData(JSON.parse(text));
      } catch (e) {
        setError(e.message);
      }
    };
    load();
  }, [filename]);

  return { data, error };
}

// Normalize rows from sales data
function normalizeRows(rows) {
  return rows.map(r => ({
    ...r,
    sku: r.sku || r.product_sku || '',
    product_name: r.product_name || r.name || '',
    product_brand: r.product_brand || r.brand || '',
    on_hand: parseInt(r.on_hand) || 0,
    reserved: parseInt(r.reserved) || 0,
  }));
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
